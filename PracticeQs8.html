<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Search in Google</title>
</head>
<body>
       <form action="https://www.google.com/search?">
              <input type="text" id="search" placeholder="Search in Google" name="q">
              <button type="submit">Search in Google</button>
       </form>
       <hr>
       <form action="https://www.youtube.com/results?">
              <input type="text" id="search" placeholder="Search in Youtube" name="search_query" >
              <button type="submit">Search in Youtube</button>
       </form>
</body>
</html>

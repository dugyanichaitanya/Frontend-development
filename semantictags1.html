<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Semantic Tags : Meaning of the content</title>
</head>
<body>
       <!-- <header> tag contains the introductory content like logo,title,navigation menu,search bar of the page which is generally not always placed at the top of the page  -->
      <header>
       GOOGLE PAGE<br>
       <nav>
       <li><a href="/home.html">Home </a></li>
       <li><a href="/aboutus.html">About Us</a></li>
       </ul>
       </nav>
      </header>
      <!-- <main> tag contains the main content like articles,page specific content (Core content of the page) -->
      <main>This is my main content</main>
      <!-- <footer>tag appears at the bottom of the page in which we include contact information or information about related link -->
      <footer>Made with &hearts;</footer>
      <!-- A website contains only one header,only one footer and only one main content -->
      <!-- <main> tag contains only non-repeated content ie we cannot repeat the same content inside the main section-->
      <!-- <nav> tag is used for navigation purpose i.e if I want to go from my current webpage to other page or another section or to link to another related information we use <nav>tag -->
      <!-- In many websites <nav> tag is defined inside the header section -->
      <!-- <article> tag contains newspaper articles and soo many things other than that -->
      <!-- <section> tag groups together related content.It's action is similar to the <div>tag,<span>tag but because of the <section> tag we can understand it's mark up-->
       <!-- <aside>tag contains indirect related content like other movie name of person who did Avengers -->


</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Button Creation Using Input Element </title>
</head>
<body>
       <form action="/action">
              <label for="name">Name:</label>
              <input type="text" id="name" placeholder="Enter your name">
              <br>
              <input type="button">
       </form>
</body>
</html>

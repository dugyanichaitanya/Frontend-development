<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Grouping Multiple Check Boxes</title>
</head>
<body>
       <form action="/server">
              <input type="checkbox" name="lang" id="hindi" value="hin">
              <label for="hindi">Hindi</label>
              <input type="checkbox" name="lang" id="english" value="eng">
              <label for="english">English</label>
              <input type="checkbox" name="lang" id="telugu" value="tel">
              <label for="telugu">Telugu</label>
              <input type="checkbox" name="lang" id="french" value="fre">
              <label for="french">French</label>
              <button>submit</button>
       </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Check Box in HTML</title>
</head>
<body>
       <form action="/server">
              <input type="checkbox" id="age" name="age" checked>
              <label for="age">I am Age 18+</label>
              <button>submit</button>
       </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Practice Qs-9 - Registration Form</title>
</head>
<body>
       <h2>Registartion Form</h2>
      <form action="/server">  
       <div>
           <input type="text" placeholder="First Name" name="fname">
           <input type="text" placeholder="Last Name" name="lname">
       </div>
       <div>
              <label for="gender">Please select gender</label>
              <select id="gender" name="gen">
                     <option value="male">Male</option>
                     <option value="female">Female</option>
                     <option value="others">Others</option>
              </select>       
       </div>
       <div>
              Do you agree to all terms of service?
              <input type="checkbox" id="agree" name="agree">
              <label for="agree">Yes, I agree </label>
        </div>
        <button>Register</button>
      </form>
</body>
</html>

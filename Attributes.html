<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Attributes in html</title>
</head>
<body>
       <!--Attributes are used to add extra information to my html tag.The attribute remains the same where as its value keeps changing.The value of an attribute can be written in a single quotes('') or double quotes("")-->
       <ol type='A'>
              <li>Bread</li>
              <li>Jam</li>
              <li>Samosa</li>
       </ol>
</body>
</html>

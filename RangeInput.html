<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Range Input Element in HTML</title>
</head>
<body>
       <form action="/server">
           <label for="volume">Select Your Volume:</label>
           <input type="range" id="volume" min="10" max="100" name="vol" step="10" value="70">
           <button>Submit</button>
       </form>
</body>
</html>

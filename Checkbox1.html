<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Check Box in Forms</title>
</head>
<body>
       <form action="/server">
              <input type="checkbox" name="age" id="age" checked>
              <label for="age">I am 18+</label>
              <button type="submit" >send</button>
       </form>
</body>
</html>

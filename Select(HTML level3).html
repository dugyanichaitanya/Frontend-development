<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Select in HTML</title>
</head>
<body>
       <form action="/action">
              <div>
              Choose your Profession:

              </select>
              <button>submit</button>
       </form>
       
</body>
</html>

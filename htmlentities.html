<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>HTML Entities</title>
</head>
<body>
       <p>a&lt;b</p><!--a is less than b-->
       <p>a&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;bcdef</p><!--we know html does not allow multiple spaces between two words.So to add multiple spaces use &nbsp;(meaning non-breaking space)html entity-->
       <p>d&gt;c</p>
       <p>&hearts;</p>
       <p>family&amp;friends</p>
       <p>&quot;Chaitanya&quot;</p>
       <p>This is a 	&#10084;</p>
       
</body>
</html>

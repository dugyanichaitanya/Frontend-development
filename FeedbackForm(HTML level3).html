<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Feedback Form</title>
</head>
<body>
       <h3>Feedback Form</h3>
       <form action="/server">
              <label for="name">Name:</label>
              <input type="text" id="name" placeholder="Write your name" name="name">
              <br><br>
              <label for="email">Email:</label>
              <input type="email" id="email" placeholder="Write your email" name="email">
              <br><br>
              <label for="feedback">Message:</label>
              <br>
              <textarea id="feedback" name="feedback" rows="4" cols="30"></textarea>
              <br><br>
              Rate us our of 5:
              <br>
              <!-- <label for="rate">Rate us our of 5:</label> -->
              <input type="radio" id="1" name="rate" value="1">
              <label for="1">1</label>
              <br>
              <input type="radio" id="2" name="rate" value="2">
              <label for="2">2</label>
              <br>
              <input type="radio" id="3" name="rate" value="3">
              <label for="3">3</label>
              <br>
              <input type="radio" id="4" name="rate" value="4">
              <label for="4">4</label>
              <br>
              <input type="radio" id="5" name="rate" value="5">
              <label for="5">5</label>
              <br><br>
              <button>Send your message!</button>
       </form>
       
</body>
</html>
